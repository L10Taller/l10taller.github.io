<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TorqueOS - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/tu-codigo.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <div class="logo">
                <img src="logo.png" alt="TorqueOS Logo">
                <span>TorqueOS</span>
            </div>
            <ul>
                <li><a href="#home" class="active"><i class="fas fa-home"></i> Inicio</a></li>
                <li><a href="#proyectos"><i class="fas fa-tools"></i> Herramientas</a></li>
                <li><a href="#descargas"><i class="fas fa-download"></i> Descargas</a></li>
            </ul>
        </nav>

        <main class="content">
            <header>
                <h1>Bienvenido al Panel de Control</h1>
            </header>
            <section class="cards-grid">
                <div class="card">
                    <h3>Windows 11 Lite</h3>
                    <p>Optimizado para diagnóstico automotriz.</p>
                    <button class="btn">Ver más</button>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
