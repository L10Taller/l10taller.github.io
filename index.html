<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La 10 del Taller | TorqueOS</title>

  <style>

    body{
      margin:0;
      background:#0b0f18;
      color:white;
      font-family:Arial, Helvetica, sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      text-align:center;
    }

    .box{
      max-width:800px;
      padding:20px;
    }

    .logo{
      width:320px;
      max-width:90%;
      margin-bottom:30px;
    }

    h1{
      font-size:52px;
      margin:10px 0;
      letter-spacing:1px;
    }

    p{
      opacity:0.8;
      font-size:20px;
      margin-top:10px;
    }

    .btn{
      background:#00c2ff;
      color:black;
      padding:14px 26px;
      border-radius:10px;
      font-weight:bold;
      text-decoration:none;
      display:inline-block;
      margin-top:25px;
      transition:0.2s;
    }

    .btn:hover{
      background:#00a5db;
    }

    .footer{
      margin-top:40px;
      font-size:14px;
      opacity:0.5;
    }

  </style>

</head>


<body>

  <div class="box">

    <img src="logo.png" class="logo" alt="Logo La 10 del Taller">

    <h1>La 10 del Taller</h1>

    <p>
      TorqueOS – Sistema optimizado para diagnóstico automotriz
    </p>

    <a class="btn" href="#">Próximamente</a>

    <div class="footer">
      © 2026 La 10 del Taller
    </div>

  </div>

</body>

</html>
